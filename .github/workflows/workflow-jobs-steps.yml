name: Workflows, Jobs, and Steps

on:
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - run: echo "This is Job 1, Step 1"
      - run: echo "This is Job 1, Step 2"
      - run: echo "which run sequentially"
      - run: echo "within the same computer environment"
  job-2:
    runs-on: ubuntu-latest
    steps:
      - run: echo "Multiple jobs run in parallel"
  job-3:
    runs-on: ubuntu-latest
    needs: 
      - job-1
      - job-2
    steps:
      - run: echo "They can also depend on each other"
  job-4:
    runs-on: ubuntu-latest
    needs: 
      - job-2
      - job-3
    steps:
      - run: echo "..to form a directed acyclic graph (DAG) of execution"